<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMA — AGW Entertainment</title>
<link href="https://cdn.jsdelivr.net/npm/dseg@0.46.0/css/dseg.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--panel-bg:#120e00;--lcd-bg:#060400;--lcd-text:#ffaa00;--lcd-dim:#7a5000;--accent:#ffaa00;--btn-bg:#1a1300;--btn-border:#3a2a00;--body-bg:#060400;--waveform:#ffaa00}
body{background:var(--body-bg);font-family:'Courier New',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;transition:background 0.4s}
.device{width:960px;max-width:99vw;background:var(--panel-bg);border:1px solid var(--btn-border);padding:22px 26px 20px;transition:all 0.3s;position:relative}
.device::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:0.5;transition:background 0.3s}
[data-theme="palestine"]::before{background:linear-gradient(90deg,#000 0%,#000 20%,#EF0000 20%,#EF0000 40%,#ffffff 40%,#ffffff 60%,#009736 60%,#009736 80%,#EF0000 80%,#EF0000 100%);opacity:0.9;height:3px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px}
.logo-wrap img{height:64px;width:auto;display:block;mix-blend-mode:screen}
.top-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.theme-row{display:flex;gap:4px}
.theme-btn{padding:4px 13px;font-size:9px;letter-spacing:3px;border:1px solid var(--btn-border);background:transparent;color:var(--lcd-dim);cursor:pointer;font-family:'Courier New',monospace;text-transform:uppercase;transition:all 0.15s}
.theme-btn:hover{color:var(--accent);border-color:var(--accent)}
.theme-btn.active{background:var(--accent);color:var(--panel-bg);border-color:var(--accent)}
.lcd-panel{background:var(--lcd-bg);border:1px solid var(--btn-border);padding:14px 16px 12px;margin-bottom:14px;position:relative;overflow:hidden}
.lcd-panel::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 4px);pointer-events:none}
.lcd-row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;gap:12px}
.lcd-artist{font-family:'DSEG7 Classic',monospace;font-size:13px;color:var(--lcd-text);letter-spacing:1px;opacity:0.7;text-shadow:0 0 5px var(--lcd-text);white-space:nowrap;overflow:hidden;text-overflow:clip;flex:1}
.lcd-time{font-family:'DSEG7 Classic',monospace;font-size:26px;color:var(--lcd-text);letter-spacing:3px;flex-shrink:0;text-shadow:0 0 14px var(--lcd-text)}
.lcd-row2{margin-bottom:6px}
.lcd-title{font-family:'DSEG7 Classic',monospace;font-size:26px;color:var(--lcd-text);letter-spacing:2px;text-shadow:0 0 14px var(--lcd-text);white-space:nowrap;overflow:hidden;text-overflow:clip;width:100%}
#waveform{display:block;width:100%;height:48px;margin:6px 0 5px}
.lcd-status{display:flex;gap:18px;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-family:'Courier New',monospace;color:var(--lcd-dim);align-items:center}
.lcd-status .val{color:var(--lcd-text);font-family:'DSEG7 Classic',monospace;font-size:11px}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--lcd-dim);flex-shrink:0;transition:background 0.2s}
.pulse-dot.on{background:var(--accent);box-shadow:0 0 6px var(--accent);animation:blink 1.2s steps(1) infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.pr-wrap{display:none;margin-bottom:14px}
#pianoRoll{display:block;width:100%;height:72px;background:var(--lcd-bg);border:1px solid var(--btn-border)}
.mode-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.mode-selector{display:flex;border:1px solid var(--btn-border)}
.mode-btn{padding:6px 20px;font-size:9px;letter-spacing:3px;border:none;background:transparent;color:var(--lcd-dim);cursor:pointer;font-family:'Courier New',monospace;text-transform:uppercase;transition:all 0.1s;border-right:1px solid var(--btn-border)}
.mode-btn:last-child{border-right:none}
.mode-btn.active{background:var(--accent);color:var(--panel-bg)}
.mode-btn:not(.active):hover{color:var(--accent)}
.mode-extras{display:flex;gap:4px}
.xbtn{height:28px;padding:0 10px;background:var(--btn-bg);border:1px solid var(--btn-border);color:var(--lcd-dim);font-size:10px;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:4px;transition:all 0.1s;white-space:nowrap}
.xbtn:hover{border-color:var(--accent);color:var(--accent)}
.xbtn.on{background:var(--accent);color:var(--panel-bg)}
.content-section{display:none}
.content-section.active{display:block}
.files-toolbar{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.ftbtn{padding:5px 14px;font-size:9px;letter-spacing:2px;text-transform:uppercase;border:1px solid var(--btn-border);background:var(--btn-bg);color:var(--lcd-dim);cursor:pointer;font-family:'Courier New',monospace;transition:all 0.15s}
.ftbtn:hover{border-color:var(--accent);color:var(--accent)}
.drop-zone{border:1px dashed var(--btn-border);padding:16px;text-align:center;color:var(--lcd-dim);font-size:9px;letter-spacing:2px;cursor:pointer;margin-bottom:8px;transition:all 0.2s;text-transform:uppercase}
.drop-zone:hover,.drop-zone.over{border-color:var(--accent);color:var(--accent)}
.playlist{max-height:110px;overflow-y:auto;border:1px solid var(--btn-border)}
.pl-item{padding:6px 12px;font-size:9px;color:var(--lcd-dim);letter-spacing:1px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--btn-border);transition:all 0.1s;text-transform:uppercase}
.pl-item:hover{color:var(--accent)}
.pl-item.active{background:var(--accent);color:var(--panel-bg)}
.pl-track{cursor:pointer;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px}
.pl-meta{display:flex;align-items:center;gap:5px;flex-shrink:0}
.pl-remove{background:transparent;border:1px solid var(--btn-border);color:var(--lcd-dim);cursor:pointer;font-size:9px;padding:1px 5px;font-family:'Courier New',monospace;transition:all 0.1s;line-height:1}
.pl-remove:hover{border-color:#ff4444;color:#ff4444}
.ext-badge{font-size:8px;opacity:0.7;padding:1px 5px;border:1px solid currentColor}
.radio-top{display:flex;gap:6px;margin-bottom:8px}
.radio-top input,.radio-top select{background:var(--lcd-bg);border:1px solid var(--btn-border);color:var(--lcd-text);padding:6px 10px;font-size:9px;letter-spacing:1px;font-family:'Courier New',monospace;outline:none;text-transform:uppercase;transition:border-color 0.15s}
.radio-top input:focus,.radio-top select:focus{border-color:var(--accent)}
.radio-top input{flex:1}
.radio-top select option{background:#000;color:var(--lcd-text)}
.scan-btn{background:var(--accent);color:var(--panel-bg);border:none;padding:6px 18px;font-size:9px;letter-spacing:3px;font-family:'Courier New',monospace;cursor:pointer;text-transform:uppercase}
.scan-btn:hover{opacity:0.85}
.presets-row{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;margin-bottom:8px}
.preset-slot{background:var(--btn-bg);border:1px solid var(--btn-border);color:var(--lcd-dim);padding:6px 3px;font-size:9px;letter-spacing:1px;cursor:pointer;text-align:center;font-family:'Courier New',monospace;text-transform:uppercase;line-height:1.4;min-height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.1s}
.preset-slot:hover{border-color:var(--accent)}
.preset-slot.loaded{border-color:var(--accent);color:var(--accent)}
.preset-slot.playing{background:var(--accent);color:var(--panel-bg)}
.preset-slot .pnum{font-size:8px;opacity:0.6;margin-bottom:2px}
.preset-slot .pname{font-size:10px;font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:72px}
.station-list{max-height:120px;overflow-y:auto;border:1px solid var(--btn-border)}
.station-item{padding:5px 10px;font-size:9px;color:var(--lcd-text);letter-spacing:1px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--btn-border);transition:all 0.1s;text-transform:uppercase;gap:8px}
.station-item:hover{background:var(--btn-bg)}
.station-item.active{background:var(--accent);color:var(--panel-bg)}
.station-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.station-meta .br{font-size:8px;opacity:0.7}
.station-item.active .star-fav{border-color:var(--panel-bg);color:var(--panel-bg)}
.radio-msg{padding:22px;text-align:center;font-size:9px;letter-spacing:2px;color:var(--lcd-dim);text-transform:uppercase}
.seek-wrap{margin:14px 0 11px}
.seek-bar{width:100%;height:3px;background:var(--btn-border);cursor:pointer;position:relative}
.seek-fill{height:100%;background:var(--accent);width:0%;pointer-events:none}
.transport{display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:12px}
.t-btn{background:var(--btn-bg);border:1px solid var(--btn-border);color:var(--lcd-dim);padding:10px 16px;font-size:13px;cursor:pointer;font-family:'Courier New',monospace;transition:all 0.1s;min-width:46px;text-align:center}
.t-btn:hover{border-color:var(--accent);color:var(--accent)}
#playBtn{padding:10px 30px;font-size:14px;border-color:var(--accent);color:var(--accent);letter-spacing:2px}
#playBtn.playing{background:var(--accent);color:var(--panel-bg)}
.vol-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.vol-lbl{font-size:8px;letter-spacing:2px;color:var(--lcd-dim);text-transform:uppercase;width:28px}
input[type=range].vol{-webkit-appearance:none;flex:1;height:2px;background:var(--btn-border);outline:none;cursor:pointer}
input[type=range].vol::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--accent);border-radius:0;cursor:pointer}
.vol-num{font-family:'DSEG7 Classic',monospace;font-size:14px;color:var(--lcd-text);width:34px;text-align:right;text-shadow:0 0 6px var(--lcd-text)}
.copyright-bar{padding-top:10px;border-top:1px solid var(--btn-border);text-align:center;font-family:'Courier New',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--lcd-text);text-shadow:0 0 6px var(--lcd-text)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--btn-bg)}
::-webkit-scrollbar-thumb{background:var(--btn-border)}

/* ── VISUALIZER ── */
#vizOverlay{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;z-index:9999;flex-direction:column}
#vizCanvas{display:block;flex:1;width:100%;min-height:0}
#vizBar{display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 16px;background:rgba(0,0,0,0.9);border-top:1px solid #222;flex-shrink:0;flex-wrap:wrap}
.viz-divider{width:1px;height:36px;background:#333;margin:0 4px}
.viz-preset,.viz-color-btn{width:46px;height:46px;background:#000;border:1px solid #333;color:#555;font-size:8px;letter-spacing:1px;cursor:pointer;font-family:'Courier New',monospace;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all 0.15s}
.viz-preset:hover,.viz-color-btn:hover{border-color:var(--accent);color:var(--accent)}
.viz-preset.active{background:var(--accent);color:#000;border-color:var(--accent)}
.viz-color-btn.active{border-color:var(--accent);color:var(--accent)}
.vp-icon{font-size:15px;line-height:1}
.vp-label,.vc-label{font-size:7px;letter-spacing:1px}
#vizClose{margin-left:8px;width:46px;height:46px;background:transparent;border:1px solid #333;color:#555;font-size:18px;cursor:pointer;transition:all 0.15s;flex-shrink:0}
#vizClose:hover{border-color:#fff;color:#fff}

/* ══════════════════════════════════════════════════════
   TABLET  600–1023px — fluid layout, touch-friendly
   ══════════════════════════════════════════════════════ */
@media(max-width:1023px){
  body{padding:12px}
  .device{width:100%;padding:16px 18px 16px}
  .logo-wrap img{height:50px}
  .lcd-time{font-size:22px}
  .lcd-title{font-size:20px}
  .lcd-artist{font-size:11px}
  .seek-bar{height:6px;border-radius:3px}
  .seek-fill{border-radius:3px}
  .t-btn{padding:12px 14px;font-size:14px;min-width:50px}
  #playBtn{padding:12px 28px;font-size:15px}
  input[type=range].vol::-webkit-slider-thumb{width:18px;height:18px}
  .pl-item{padding:10px 12px}
  .pl-track{font-size:10px}
  .station-item{padding:10px 12px;font-size:10px}
  .preset-slot{min-height:46px}
  .preset-slot .pname{font-size:11px}
}

/* ══════════════════════════════════════════════════════
   PHONE  < 600px — full portrait redesign
   ══════════════════════════════════════════════════════ */
@media(max-width:599px){
  body{padding:0;background:var(--body-bg);justify-content:flex-start;min-height:100dvh}

  .device{
    width:100%;max-width:100%;
    padding:12px 14px 80px;
    border:none;border-radius:0;
    min-height:100dvh;
  }
  .device::before{height:3px}

  /* Top bar */
  .top-bar{margin-bottom:12px;gap:8px}
  .logo-wrap img{height:38px}
  .top-right{flex-direction:row;align-items:center;gap:8px}
  .theme-row{display:none}
  #themeCycleBtn{
    display:flex!important;
    padding:5px 10px;font-size:8px;letter-spacing:2px;
    border:1px solid var(--btn-border);background:var(--btn-bg);
    color:var(--lcd-text);cursor:pointer;
    font-family:'Courier New',monospace;text-transform:uppercase;
    align-items:center;gap:5px;white-space:nowrap;
  }

  /* LCD */
  .lcd-panel{padding:10px 12px 10px}
  .lcd-row1{flex-direction:row;gap:8px;margin-bottom:4px}
  .lcd-artist{font-size:11px;flex:1}
  .lcd-time{font-size:20px;letter-spacing:2px}
  .lcd-title{font-size:18px;letter-spacing:1px}
  #waveform{height:38px}

  /* Hide status row on phone */
  .lcd-status{display:none}

  /* Piano roll compact */
  #pianoRoll{height:50px}

  /* Mode bar */
  .mode-bar{margin-bottom:10px;gap:8px}
  .mode-selector{flex:1}
  .mode-btn{flex:1;padding:8px 6px;font-size:10px;letter-spacing:2px;text-align:center}
  .mode-extras{gap:6px}
  .xbtn{height:36px;padding:0 10px;font-size:10px}

  /* Files */
  .files-toolbar{gap:5px;margin-bottom:8px}
  .ftbtn{padding:8px 10px;font-size:9px;letter-spacing:1px;flex:1;text-align:center}
  .drop-zone{display:none}
  .playlist{max-height:220px;border-radius:0}
  .pl-item{padding:11px 10px}
  .pl-track{font-size:11px}
  .pl-remove{padding:4px 8px;font-size:10px}
  .ext-badge{font-size:9px;padding:2px 6px}

  /* Radio */
  .radio-top{flex-direction:column;gap:6px}
  .radio-top input,.radio-top select{width:100%;padding:10px 12px;font-size:11px}
  .scan-btn{padding:10px;font-size:10px;letter-spacing:2px}
  .presets-row{
    display:flex;overflow-x:auto;gap:5px;
    padding-bottom:4px;margin-bottom:10px;
    grid-template-columns:none;
    scrollbar-width:none;
  }
  .presets-row::-webkit-scrollbar{display:none}
  .preset-slot{min-width:68px;min-height:52px;flex-shrink:0}
  .preset-slot .pname{font-size:10px;max-width:60px}
  .station-list{max-height:200px}
  .station-item{padding:12px 10px;font-size:11px}
  .station-meta .br{font-size:9px}

  /* Seek */
  .seek-wrap{margin:12px 0 10px}
  .seek-bar{height:8px;border-radius:4px}
  .seek-fill{border-radius:4px}

  /* Transport — fixed to bottom */
  .transport{
    position:fixed;bottom:0;left:0;right:0;
    background:var(--panel-bg);
    border-top:1px solid var(--btn-border);
    padding:10px 12px 14px;
    margin:0;gap:6px;
    z-index:100;
  }
  .t-btn{
    flex:1;padding:14px 6px;font-size:14px;
    min-width:0;min-height:52px;
    border-radius:0;
  }
  #playBtn{flex:1.6;font-size:16px;letter-spacing:1px;padding:14px 6px}

  /* Volume */
  .vol-row{gap:10px;padding:0 2px;margin-bottom:10px}
  .vol-lbl{font-size:9px;width:24px}
  input[type=range].vol{height:4px}
  input[type=range].vol::-webkit-slider-thumb{width:20px;height:20px;border-radius:0}
  .vol-num{font-size:13px;width:30px}

  /* VIZ button — floating */
  #vizFloatBtn{
    display:flex!important;
    position:fixed;bottom:76px;right:14px;
    width:48px;height:48px;
    background:var(--accent);color:var(--panel-bg);
    border:none;border-radius:0;
    font-size:18px;cursor:pointer;
    align-items:center;justify-content:center;
    z-index:101;box-shadow:0 0 16px var(--accent);
    font-family:'Courier New',monospace;
  }

  /* Loop/Shuf buttons in mode extras — hide text labels */
  .xbtn span.xbtn-label{display:none}

  /* Copyright */
  .copyright-bar{
    font-size:8px;letter-spacing:2px;
    padding:8px 0 4px;margin-bottom:70px;
  }

  /* Viz bar on mobile — wrap and larger buttons */
  #vizBar{padding:8px 8px 14px;gap:4px}
  .viz-preset,.viz-color-btn{width:40px;height:40px;font-size:7px}
  .vp-icon{font-size:13px}
  .viz-divider{height:28px}
  #vizClose{width:40px;height:40px;font-size:14px}
}
</style>
</head>
<body>

<div class="device" id="device">
  <div class="top-bar">
    <div class="logo-wrap"><img id="logoImg" src="" alt="SAMA"></div>
    <div class="top-right">
      <div class="theme-row">
        <button class="theme-btn active" onclick="setTheme('casio')">CASIO</button>
        <button class="theme-btn" onclick="setTheme('roland')">ROLAND</button>
        <button class="theme-btn" onclick="setTheme('yamaha')">YAMAHA</button>
        <button class="theme-btn" onclick="setTheme('palestine')" style="letter-spacing:1px;font-size:8px">🇵🇸 FREE PALESTINE</button>
      </div>
      <!-- © AGW Entertainment — authorship preserved in source -->
      <button id="themeCycleBtn" style="display:none" onclick="cycleTheme()">⬡ <span id="themeCycleLbl">CASIO</span></button>
    </div>
  </div>
  <div class="lcd-panel">
    <div class="lcd-row1">
      <div class="lcd-artist" id="lcdArtist"></div>
      <div class="lcd-time" id="lcdTime">00:00:00</div>
    </div>
    <div class="lcd-row2"><div class="lcd-title" id="lcdTitle">-- SAMA PLAYER --</div></div>
    <canvas id="waveform" height="48"></canvas>
    <div class="lcd-status">
      <div class="pulse-dot" id="pulseDot"></div>
      <div>SRC&nbsp;<span class="val" id="stSrc">---</span></div>
      <div>TYPE&nbsp;<span class="val" id="stType">---</span></div>
      <div>INFO&nbsp;<span class="val" id="stInfo">READY</span></div>
      <div>STATUS&nbsp;<span class="val" id="stStatus">STOP</span></div>
    </div>
  </div>
  <div class="pr-wrap" id="prWrap"><canvas id="pianoRoll" height="72"></canvas></div>
  <div class="mode-bar">
    <div class="mode-selector">
      <button class="mode-btn active" onclick="setMode('files')">FILES</button>
      <button class="mode-btn" onclick="setMode('radio')">RADIO</button>
    </div>
    <div class="mode-extras">
      <button class="xbtn" id="loopBtn" onclick="toggleLoop()">↺ LOOP</button>
      <button class="xbtn" id="shufBtn" onclick="toggleShuffle()">⇄ SHUF</button>
      <button class="xbtn" onclick="openVisualizer()" style="border-color:var(--accent);color:var(--accent)">⬡ VIZ</button>
    </div>
  </div>
  <div class="content-section active" id="filesSection">
    <div class="files-toolbar">
      <button class="ftbtn" onclick="document.getElementById('fileIn').click()">▼ ADD FILES</button>
      <button class="ftbtn" onclick="openFolder()">⊞ SELECT FOLDER</button>
      <button class="ftbtn" onclick="createPlaylist()">+ CREATE PLAYLIST</button>
      <button class="ftbtn" onclick="loadSavedPlaylist()">▶ LOAD PLAYLIST</button>
      <button class="ftbtn" onclick="clearPlaylist()" style="margin-left:auto">✕ CLEAR</button>
    </div>
    <input type="file" id="fileIn" accept=".mp3,.wav,.mid,.midi" multiple style="display:none">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileIn').click()">▼ Drop MP3 · WAV · MIDI — or click to browse</div>
    <div class="playlist" id="playlist"><div class="radio-msg">No files loaded</div></div>
  </div>
  <div class="content-section" id="radioSection">
    <div class="radio-top">
      <input type="text" id="radioQ" placeholder="Station name..." onkeydown="if(event.key==='Enter')scanRadio()">
      <select id="radioTag">
        <option value="">All Genres</option><option value="jazz">Jazz</option><option value="electronic">Electronic</option>
        <option value="trance">Trance</option><option value="house">House</option><option value="ambient">Ambient</option>
        <option value="classical">Classical</option><option value="synthwave">Synthwave</option><option value="rock">Rock</option>

let currentTheme=localStorage.getItem('sama_theme')||'casio';
function setTheme(n){if(!THEMES[n])return;currentTheme=n;const r=document.documentElement;for(const[k,v]of Object.entries(THEMES[n]))r.style.setProperty(k,v);document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick').includes("'"+n+"'")));document.getElementById('device').dataset.theme=n;localStorage.setItem('sama_theme',n);}

let audioCtx=null,analyser=null;
const audioEl=new Audio();audioEl.crossOrigin='anonymous';
let isPlaying=false,isLoop=false,isShuffle=false,mode='files',fileType=null;
let playlist=[],curIdx=-1,currentStation=null;

function ensureAudioCtx(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();analyser=audioCtx.createAnalyser();analyser.fftSize=2048;analyser.smoothingTimeConstant=0.82;const src=audioCtx.createMediaElementSource(audioEl);src.connect(analyser);analyser.connect(audioCtx.destination);}
function resumeCtx(){if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();}
function fftAvg(d,a,b){let s=0;for(let i=a;i<b&&i<d.length;i++)s+=d[i];return s/(b-a);}
function fmt(s){if(!isFinite(s)||isNaN(s))return'00:00:00';return p(Math.floor(s/3600))+':'+p(Math.floor((s%3600)/60))+':'+p(Math.floor(s%60));}
function p(n){return String(n).padStart(2,'0')}
function parseTrack(name){const base=name.replace(/\.[^.]+$/,'');const sep=base.indexOf(' - ');if(sep>-1)return{artist:base.slice(0,sep),title:base.slice(sep+3)};return{artist:'',title:base};}
function hexToRgb(hex){const h=hex.replace('#','');if(h.length!==6)return{r:255,g:170,b:0};return{r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)};}

const wfCv=document.getElementById('waveform'),wfCx=wfCv.getContext('2d');
function drawWaveform(){requestAnimationFrame(drawWaveform);const W=wfCv.offsetWidth||910;wfCv.width=W;const H=wfCv.height;wfCx.clearRect(0,0,W,H);const color=getComputedStyle(document.documentElement).getPropertyValue('--waveform').trim();if(!analyser||!isPlaying){wfCx.strokeStyle=color+'28';wfCx.lineWidth=1;wfCx.beginPath();const t=Date.now()/3000;for(let x=0;x<W;x++){const y=H/2+Math.sin((x/W)*6+t)*1.5;x===0?wfCx.moveTo(x,y):wfCx.lineTo(x,y);}wfCx.stroke();return;}const buf=new Uint8Array(analyser.frequencyBinCount);analyser.getByteTimeDomainData(buf);wfCx.strokeStyle=color;wfCx.lineWidth=1.5;wfCx.beginPath();const sw=W/buf.length;let x=0;for(let i=0;i<buf.length;i++){const v=buf[i]/128,y=(v*H)/2;i===0?wfCx.moveTo(x,y):wfCx.lineTo(x,y);x+=sw;}wfCx.stroke();wfCx.save();wfCx.globalAlpha=0.18;wfCx.strokeStyle=color;wfCx.lineWidth=5;wfCx.beginPath();x=0;for(let i=0;i<buf.length;i++){const v=buf[i]/128,y=(v*H)/2;i===0?wfCx.moveTo(x,y):wfCx.lineTo(x,y);x+=sw;}wfCx.stroke();wfCx.restore();}
drawWaveform();

const prCv=document.getElementById('pianoRoll'),prCx=prCv.getContext('2d');
function drawPianoRoll(){prAnimId=requestAnimationFrame(drawPianoRoll);const W=prCv.offsetWidth||910;prCv.width=W;const H=prCv.height;prCx.clearRect(0,0,W,H);const color=getComputedStyle(document.documentElement).getPropertyValue('--waveform').trim();prCx.strokeStyle=color+'18';prCx.lineWidth=0.5;for(let i=0;i<8;i++){const y=(i/8)*H;prCx.beginPath();prCx.moveTo(0,y);prCx.lineTo(W,y);prCx.stroke();}midiActiveNotes.forEach(n=>{const x=n.x%W,y=H-(n.note/127)*H;prCx.fillStyle=color;prCx.globalAlpha=Math.max(0.1,n.life);prCx.fillRect(x,y-2,Math.max(6,n.vel/3),4);});prCx.globalAlpha=1;midiActiveNotes.forEach(n=>{n.x+=1.5;n.life-=0.008;});midiActiveNotes=midiActiveNotes.filter(n=>n.life>0&&n.x<W+50);}

function addFiles(files){const valid=files.filter(f=>/\.(mp3|wav|mid|midi)$/i.test(f.name));if(!valid.length)return;valid.forEach(f=>{const ext=f.name.split('.').pop().toLowerCase();const type=['mid','midi'].includes(ext)?'midi':'audio';playlist.push({name:f.name,url:URL.createObjectURL(f),type,file:f});});renderPlaylist();if(curIdx===-1)loadTrack(0);}
function renderPlaylist(){
  const el=document.getElementById('playlist');
  if(!playlist.length){el.innerHTML='<div class="radio-msg">No files loaded — use ADD FILES or SELECT FOLDER above</div>';return;}
  el.innerHTML='';
  playlist.forEach((item,i)=>{
    const d=document.createElement('div');
    d.className='pl-item'+(i===curIdx?' active':'');
    const ext=item.name.split('.').pop().toUpperCase();
    const{artist,title}=parseTrack(item.name);
    const disp=artist?artist.toUpperCase()+' — '+title.toUpperCase():title.toUpperCase();
    const trackSpan=document.createElement('span');
    trackSpan.className='pl-track';trackSpan.textContent=disp.slice(0,52);
    trackSpan.onclick=()=>{loadTrack(i);audioEl.play().catch(()=>{});};
    const meta=document.createElement('span');meta.className='pl-meta';
    meta.innerHTML=`<span class="ext-badge">${ext}</span>`;
    const rem=document.createElement('button');rem.className='pl-remove';rem.textContent='✕';rem.title='Remove track';
    rem.onclick=e=>{e.stopPropagation();removeTrack(i);};
    meta.appendChild(rem);
    d.appendChild(trackSpan);d.appendChild(meta);
    el.appendChild(d);
  });
}
function removeTrack(i){
  if(playlist[i])URL.revokeObjectURL(playlist[i].url);
  playlist.splice(i,1);
  if(curIdx===i){stopAll();curIdx=playlist.length>0?Math.min(i,playlist.length-1):-1;if(curIdx>=0)loadTrack(curIdx);}
  else if(curIdx>i)curIdx--;
  renderPlaylist();
}
async function loadTrack(idx){if(idx<0||idx>=playlist.length)return;curIdx=idx;const trk=playlist[idx];stopAll(true);fileType=trk.type;const{artist,title}=parseTrack(trk.name);document.getElementById('lcdArtist').textContent=artist?artist.toUpperCase():'';document.getElementById('lcdTitle').textContent=title.toUpperCase().slice(0,38);document.getElementById('stSrc').textContent='FILE';document.getElementById('stType').textContent=trk.type==='midi'?'MIDI':trk.name.split('.').pop().toUpperCase();document.getElementById('stInfo').textContent='---';if(trk.type==='midi'){document.getElementById('prWrap').style.display='block';if(!prAnimId)drawPianoRoll();await loadMidi(trk.file);}else{document.getElementById('prWrap').style.display='none';if(prAnimId){cancelAnimationFrame(prAnimId);prAnimId=null;}audioEl.src=trk.url;audioEl.load();ensureAudioCtx();resumeCtx();}renderPlaylist();}
function openFolder(){const inp=document.createElement('input');inp.type='file';inp.webkitdirectory=true;inp.multiple=true;inp.onchange=()=>{const files=[...inp.files].filter(f=>/\.(mp3|wav|mid|midi)$/i.test(f.name));if(!files.length){alert('No audio files found.');return;}files.forEach(f=>{const ext=f.name.split('.').pop().toLowerCase();const type=['mid','midi'].includes(ext)?'midi':'audio';playlist.push({name:f.name,url:URL.createObjectURL(f),type,file:f});});renderPlaylist();if(curIdx===-1)loadTrack(0);};inp.click();}
function createPlaylist(){if(!playlist.length){alert('No tracks loaded.');return;}const name=prompt('Name this playlist:');if(!name||!name.trim())return;const saved=JSON.parse(localStorage.getItem('sama_playlists')||'{}');saved[name.trim()]=playlist.map(t=>t.name);localStorage.setItem('sama_playlists',JSON.stringify(saved));alert(`Saved "${name.trim()}" — ${playlist.length} tracks.`);}
function loadSavedPlaylist(){const saved=JSON.parse(localStorage.getItem('sama_playlists')||'{}');const names=Object.keys(saved);if(!names.length){alert('No saved playlists.');return;}const name=prompt('Playlists:\n'+names.map((n,i)=>i+1+'. '+n).join('\n')+'\n\nEnter name:');if(!name||!saved[name.trim()]){if(name)alert('Not found.');return;}alert(`"${name.trim()}" has ${saved[name.trim()].length} tracks. Re-add via folder or files.`);}

async function loadMidi(file){midiActiveNotes=[];if(typeof MidiPlayer==='undefined'){document.getElementById('stInfo').textContent='MIDI LIB?';return;}if(midiInst){try{midiInst.stop();}catch(e){}midiInst=null;}try{if(!sfAC)sfAC=new(window.AudioContext||window.webkitAudioContext)();let noteX=0;midiInst=new MidiPlayer.Player(async evt=>{if(evt.name==='Note on'&&evt.velocity>0){midiActiveNotes.push({note:evt.noteNumber,vel:evt.velocity,x:(noteX++*18)%(prCv.offsetWidth||910),life:1.0});document.getElementById('lcdTime').textContent=fmt(midiInst.getSongTime?midiInst.getSongTime():0);if(typeof Soundfont!=='undefined'&&sfAC){try{if(!sfPlayer)sfPlayer=await Soundfont.instrument(sfAC,'acoustic_grand_piano',{soundfont:'MusyngKite'});sfPlayer.play(evt.noteNumber,sfAC.currentTime,{duration:0.6,gain:evt.velocity/127});}catch(e){}}}if(evt.name==='Set Tempo')document.getElementById('stInfo').textContent=Math.round(60000000/evt.data)+'BPM';});const buf=await file.arrayBuffer();midiInst.loadArrayBuffer(buf);document.getElementById('stInfo').textContent='MIDI OK';}catch(e){document.getElementById('stInfo').textContent='MIDI ERR';}}

function togglePlay(){ensureAudioCtx();resumeCtx();if(fileType==='midi'&&midiInst){if(midiInst.isPlaying()){midiInst.pause();setPlayState(false);}else{midiInst.play();setPlayState(true);}return;}if(mode==='radio'){if(isPlaying){audioEl.pause();setPlayState(false);}else if(currentStation){audioEl.play().then(()=>setPlayState(true)).catch(()=>{document.getElementById('stInfo').textContent='CORS ERR';});}return;}if(curIdx<0&&playlist.length)loadTrack(0);if(isPlaying){audioEl.pause();setPlayState(false);}else{audioEl.play().catch(e=>console.log(e));setPlayState(true);}}

async function scanRadio(){const name=document.getElementById('radioQ').value.trim(),tag=document.getElementById('radioTag').value;document.getElementById('stationList').innerHTML='<div class="radio-msg">SCANNING...</div>';document.getElementById('stInfo').textContent='SCAN';const params=new URLSearchParams({limit:60,hidebroken:true,order:'votes',reverse:true});if(name)params.set('name',name);if(tag)params.set('tag',tag);let stations=[];for(const srv of RADIO_SERVERS){try{const r=await fetch(`${srv}/json/stations/search?${params}`,{headers:{'User-Agent':'SAMAPlayer/1.0'}});if(r.ok){stations=await r.json();break;}}catch(e){}}if(!stations.length){document.getElementById('stationList').innerHTML='<div class="radio-msg">No stations found</div>';document.getElementById('stInfo').textContent='NONE';return;}document.getElementById('stInfo').textContent=stations.length+'ST';renderStations(stations);}

const vizCv=document.getElementById('vizCanvas'),vizCx=vizCv.getContext('2d');
let vizMode='geometric',colorMode='theme',vizActive=false,vizAnimId=null;

// ── COLOR SYSTEM ──
let colorHue=0,beatHue=0,prevBass=0,beatColorRgb={r:255,g:170,b:0};
let randColorHue=0,randColorTarget=Math.random()*360;
const FIRE_PALETTE=[[255,0,0],[255,80,0],[255,160,0],[255,220,0],[255,255,100]];
const ICE_PALETTE=[[0,100,255],[0,200,255],[100,220,255],[180,240,255],[220,255,255]];
const AURORA_PALETTE=[[0,255,150],[0,150,255],[150,0,255],[255,0,200],[0,255,255]];
// Palestinian flag: black, red, white, green
const PALEST_PALETTE=[[10,10,10],[239,0,0],[240,240,240],[0,151,54],[239,0,0],[10,10,10],[240,240,240],[0,151,54]];

function resolveColor(fft,idx,total){
  switch(colorMode){
    case 'theme':{const c=getComputedStyle(document.documentElement).getPropertyValue('--waveform').trim();return hexToRgb(c);}
    case 'drift':{colorHue=(colorHue+0.005)%360;const[r,g,b]=hslToRgb(colorHue,1,0.58);return{r,g,b};}
    case 'bloom':{const bass=fft?fftAvg(fft,0,8)/255:0;if(bass>0.65&&prevBass<0.5){beatHue=(beatHue+60+Math.random()*120)%360;}prevBass=bass;// Slowly interpolate toward target — no instant jump
      const diff=((beatHue-colorHue+540)%360)-180;colorHue=(colorHue+diff*0.015+360)%360;const[r,g,b]=hslToRgb(colorHue,1,0.6);return{r,g,b};}
    case 'prism':{const h=(idx/total)*360;const[r,g,b]=hslToRgb(h,1,0.6);return{r,g,b};}
    case 'fire':{const pi=Math.floor((idx/total)*FIRE_PALETTE.length);const[r,g,b]=FIRE_PALETTE[pi%FIRE_PALETTE.length];return{r,g,b};}
    case 'ice':{const pi=Math.floor((idx/total)*ICE_PALETTE.length);const[r,g,b]=ICE_PALETTE[pi%ICE_PALETTE.length];return{r,g,b};}
    case 'aurora':{const pi=Math.floor((idx/total)*AURORA_PALETTE.length);const[r,g,b]=AURORA_PALETTE[pi%AURORA_PALETTE.length];return{r,g,b};}
    case 'palestine':{const pi=Math.floor((idx/total)*PALEST_PALETTE.length)%PALEST_PALETTE.length;const[r,g,b]=PALEST_PALETTE[pi];return{r,g,b};}
    case 'rand':{randColorHue+=(((randColorTarget-randColorHue+540)%360)-180)*0.008;if(Math.abs(((randColorTarget-randColorHue+540)%360)-180)<2)randColorTarget=Math.random()*360;const[r,g,b]=hslToRgb(randColorHue,1,0.6);return{r,g,b};}
    default:{const c=getComputedStyle(document.documentElement).getPropertyValue('--waveform').trim();return hexToRgb(c);}
  }
}

// ── RANDOM VIZ ──
const VIZ_POOL=['geometric','spectrum','scope','radial','mirror','plasma'];
let rndTimer=0,rndInterval=380,rndPrevBass=0;
function tickRandom(fft){
  if(vizMode!=='random')return;
  const bass=fft?fftAvg(fft,0,8)/255:0;
  rndTimer++;
  // Switch on strong beat OR after interval
  const beatHit=bass>0.72&&rndPrevBass<0.5;
  rndPrevBass=bass;
  if(rndTimer>rndInterval||beatHit){
    rndTimer=0;
    rndInterval=200+Math.floor(Math.random()*400);
    const current=document.getElementById('vizCanvas')._activeMode||'geometric';
    let next;do{next=VIZ_POOL[Math.floor(Math.random()*VIZ_POOL.length)];}while(next===current&&VIZ_POOL.length>1);
    vizCv._activeMode=next;
    // Flash label briefly
    document.getElementById('vp-random').querySelector('.vp-label').textContent=next.slice(0,4).toUpperCase();
  }
}
function rgbStr(rgb,a=1){return`rgba(${rgb.r},${rgb.g},${rgb.b},${a})`;}
function hslToRgb(h,s,l){const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h/30)%12;return l-a*Math.max(Math.min(k-3,9-k,1),-1)};return[Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)];}
function getFFT(){const fft=new Uint8Array(analyser?analyser.frequencyBinCount:1024),time=new Uint8Array(analyser?analyser.frequencyBinCount:1024);if(analyser){analyser.getByteFrequencyData(fft);analyser.getByteTimeDomainData(time);}return{fft,time};}
function hexToRgb(hex){const h=(hex||'#ffaa00').replace('#','');if(h.length!==6)return{r:255,g:170,b:0};return{r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)};}

function setColorMode(m){colorMode=m;document.querySelectorAll('.viz-color-btn').forEach(b=>b.classList.toggle('active',b.id==='vc-'+m));}
function setVizMode(m){vizMode=m;document.querySelectorAll('.viz-preset').forEach(b=>b.classList.toggle('active',b.id==='vp-'+m));}

function openVisualizer(){ensureAudioCtx();resumeCtx();const ov=document.getElementById('vizOverlay');ov.style.display='flex';vizActive=true;resizeViz();startViz();ov.requestFullscreen().catch(()=>{});}
function closeVisualizer(){vizActive=false;if(vizAnimId){cancelAnimationFrame(vizAnimId);vizAnimId=null;}document.getElementById('vizOverlay').style.display='none';if(document.fullscreenElement)document.exitFullscreen().catch(()=>{});}
document.addEventListener('fullscreenchange',()=>{if(!document.fullscreenElement&&vizActive)closeVisualizer();});
window.addEventListener('resize',()=>{if(vizActive)resizeViz();});
function resizeViz(){vizCv.width=window.innerWidth;vizCv.height=window.innerHeight;}

function startViz(){if(vizAnimId)cancelAnimationFrame(vizAnimId);function frame(){vizAnimId=requestAnimationFrame(frame);if(!vizActive)return;const W=vizCv.width,H=vizCv.height;const{fft,time}=getFFT();tickRandom(fft);const activeMode=vizMode==='random'?(vizCv._activeMode||'geometric'):vizMode;switch(activeMode){case'geometric':drawGeometric(W,H,fft,time);break;case'spectrum':drawSpectrum(W,H,fft);break;case'scope':drawScope(W,H,time,fft);break;case'radial':drawRadial(W,H,fft);break;case'mirror':drawMirror(W,H,fft,time);break;case'plasma':drawPlasma(W,H,fft,time);break;}}frame();}

// ──────────────────────────────────────────────────────
//  1. ISLAMIC GEOMETRIC — with heavy pulse
// ──────────────────────────────────────────────────────
let geoRot=0,geoPoints=8,geoScale=1,geoTime=0,geoPulse=0,geoPrevBass=0,geoShockwaves=[];

function drawGeometric(W,H,fft,time){
  const bass=fftAvg(fft,0,8)/255;
  const mid=fftAvg(fft,8,80)/255;
  const high=fftAvg(fft,80,200)/255;
  const overall=fftAvg(fft,0,200)/255;

  geoTime+=0.004+bass*0.012;
  geoRot+=0.0008+bass*0.004;
  geoPoints+=(Math.round(6+mid*8)-geoPoints)*0.04;

  // Scale breathes with bass — the whole field expands/contracts
  const baseTile=Math.min(W,H)*0.12+bass*Math.min(W,H)*0.04;
  geoScale=baseTile;

  // Beat detection — fire shockwave
  if(bass>0.7&&geoPrevBass<0.55){
    geoPulse=1.0;
    geoShockwaves.push({r:0,maxR:Math.max(W,H)*0.8,alpha:1});
  }
  geoPrevBass=bass;
  geoPulse*=0.88;

  vizCx.fillStyle=`rgba(0,0,0,0.18)`;
  vizCx.fillRect(0,0,W,H);

  const n=Math.max(5,Math.round(geoPoints));
  const alpha=0.55+overall*0.45;
  const lw=0.8+overall*1.6;

  vizCx.save();
  vizCx.translate(W/2,H/2);
  vizCx.rotate(geoRot);

  const cols=Math.ceil(W/geoScale)+2;
  const rows=Math.ceil(H/geoScale)+2;

  for(let row=-rows;row<=rows;row++){
    for(let col=-cols;col<=cols;col++){
      const x=col*geoScale+(row%2===0?0:geoScale*0.5);
      const y=row*geoScale*0.866;
      const dist=Math.sqrt(x*x+y*y);
      const maxDist=Math.sqrt(W*W+H*H)*0.6;
      const fade=Math.max(0,1-dist/maxDist);
      if(fade<0.01)continue;

      const outerR=geoScale*0.48;
      const innerR=outerR*(0.35+high*0.15);
      // THE KEY — per-tile sinusoidal rotation based on distance creates the wave ripple
      const localRot=Math.sin(geoTime+dist*0.002)*0.15;

      const col_rgb=resolveColor(fft,Math.floor(dist),Math.floor(maxDist));

      vizCx.globalAlpha=alpha*fade;
      vizCx.strokeStyle=rgbStr(col_rgb,1);
      vizCx.lineWidth=lw;

      drawStarPath(x,y,outerR,innerR,n,localRot);
      vizCx.stroke();

      // Glow pass
      vizCx.save();vizCx.globalAlpha=alpha*fade*0.2;vizCx.lineWidth=lw*5;
      drawStarPath(x,y,outerR,innerR,n,localRot);vizCx.stroke();vizCx.restore();

      // Inner detail ring
      if(overall>0.1){
        vizCx.globalAlpha=alpha*fade*0.4;
        vizCx.lineWidth=lw*0.6;
        drawStarPath(x,y,innerR*0.9,innerR*0.45,n,localRot+Math.PI/n);
        vizCx.stroke();
      }

      // Connecting straps
      if(overall>0.05&&fade>0.2){
        vizCx.globalAlpha=alpha*fade*0.2;
        vizCx.lineWidth=lw*0.35;
        for(let k=0;k<n;k++){
          const a=(k/n)*Math.PI*2+localRot;
          vizCx.beginPath();vizCx.moveTo(x,y);
          vizCx.lineTo(x+Math.cos(a)*geoScale,y+Math.sin(a)*geoScale);
          vizCx.stroke();
        }
      }
    }
  }

  // Center bloom on beat — inside translate so it's centered
  if(bass>0.5){
    vizCx.globalAlpha=bass*0.3;
    const bloom_rgb=resolveColor(fft,0,1);
    vizCx.strokeStyle=rgbStr(bloom_rgb,1);
    vizCx.lineWidth=1;
    for(let r=1;r<=5;r++){
      drawStarPath(0,0,geoScale*r*0.5,geoScale*r*0.25,n,geoRot*r);
      vizCx.stroke();
    }
  }

  vizCx.globalAlpha=1;
  vizCx.restore();

  // Shockwave rings
  geoShockwaves.forEach(sw=>{
    const sw_rgb=resolveColor(fft,0,1);
    vizCx.save();vizCx.translate(W/2,H/2);
    for(let s=0;s<n;s++){
      vizCx.save();vizCx.rotate((s/n)*Math.PI*2+geoRot);
      for(let ring=1;ring<=3;ring++){
        const r=sw.r*ring*0.35;if(r>sw.maxR)continue;
        vizCx.globalAlpha=sw.alpha*(1-r/sw.maxR)*0.5;
        vizCx.strokeStyle=rgbStr(sw_rgb,1);vizCx.lineWidth=1.5;
        drawStarPath(0,0,r,r*0.5,n,0);vizCx.stroke();
      }
      vizCx.restore();
    }
    vizCx.restore();
    sw.r+=8+bass*20;sw.alpha*=0.94;
  });
  geoShockwaves=geoShockwaves.filter(sw=>sw.alpha>0.02);
  vizCx.globalAlpha=1;
}

function drawStarPath(cx,cy,outerR,innerR,n,rotation){
  vizCx.beginPath();
  for(let i=0;i<n*2;i++){
    const angle=(i*Math.PI)/n+rotation-Math.PI/2;
    const r=i%2===0?outerR:innerR;
    const x=cx+Math.cos(angle)*r,y=cy+Math.sin(angle)*r;
    i===0?vizCx.moveTo(x,y):vizCx.lineTo(x,y);
  }
  vizCx.closePath();
}

// ──────────────────────────────────────────────────────
//  2. SPECTRUM
// ──────────────────────────────────────────────────────
let specPeaks=[],specTime=0;
function drawSpectrum(W,H,fft){
  specTime+=0.018;
  const bass=fftAvg(fft,0,8)/255;
  const overall=fftAvg(fft,0,200)/255;
  vizCx.fillStyle=`rgba(0,0,0,${0.18+bass*0.08})`;vizCx.fillRect(0,0,W,H);
  const bars=140;const bw=W/bars-1;
  if(specPeaks.length!==bars)specPeaks=Array(bars).fill(0);
  // Slow wave that rolls across bar heights independently of audio
  for(let i=0;i<bars;i++){
    const idx=Math.floor((i/bars)*fft.length*0.75);
    const v=fft[idx]/255;
    // Autonomous wave modulation — bars breathe even in silence
    const wave=Math.sin(specTime*1.2+(i/bars)*Math.PI*3)*0.08+Math.sin(specTime*0.7+(i/bars)*Math.PI*6)*0.04;
    const bh=Math.max(2,(v+wave)*H*0.88);
    const x=i*(bw+1);
    if(bh>specPeaks[i])specPeaks[i]=bh;else specPeaks[i]*=0.962;
    const rgb=resolveColor(fft,i,bars);
    const grad=vizCx.createLinearGradient(0,H,0,H-bh);
    grad.addColorStop(0,rgbStr(rgb,0.95));grad.addColorStop(0.5,rgbStr(rgb,0.5));grad.addColorStop(1,rgbStr(rgb,0.05));
    vizCx.fillStyle=grad;vizCx.fillRect(x,H-bh,bw,bh);
    // Mirror reflection at bottom
    vizCx.save();vizCx.globalAlpha=0.15;
    const grad2=vizCx.createLinearGradient(0,H,0,H+bh*0.3);
    grad2.addColorStop(0,rgbStr(rgb,0.5));grad2.addColorStop(1,rgbStr(rgb,0));
    vizCx.fillStyle=grad2;vizCx.fillRect(x,H,bw,bh*0.3);vizCx.restore();
    // Peak line
    vizCx.fillStyle=rgbStr(rgb,0.95);vizCx.globalAlpha=1;
    vizCx.fillRect(x,H-specPeaks[i]-2,bw,2);
  }
  vizCx.fillStyle='rgba(0,0,0,0.04)';
  for(let y=0;y<H;y+=4)vizCx.fillRect(0,y,W,2);
}

// ──────────────────────────────────────────────────────
//  3. SCOPE
// ──────────────────────────────────────────────────────
let scopeMode=0,scopeTimer=0,scopeZoom=1,scopeShift=0;
function drawScope(W,H,time,fft){
  const bass=fftAvg(fft,0,8)/255;
  const overall=fftAvg(fft,0,200)/255;
  // Slow fade — longer trail for more movement feel
  vizCx.fillStyle=`rgba(0,0,0,${0.12+bass*0.1})`;vizCx.fillRect(0,0,W,H);
  scopeTimer++;if(scopeTimer>600){scopeMode=(scopeMode+1)%3;scopeTimer=0;}
  // Autonomous zoom pulse
  scopeZoom+=(1+overall*0.4-scopeZoom)*0.04;
  scopeShift+=0.008+bass*0.02;
  const rgb=resolveColor(fft,0,1);

  if(scopeMode===0){
    // Classic — with autonomous vertical drift and zoom
    for(let pass=0;pass<2;pass++){
      vizCx.save();
      vizCx.translate(W/2,H/2);vizCx.scale(scopeZoom,scopeZoom);vizCx.translate(-W/2,-H/2);
      vizCx.strokeStyle=rgbStr(rgb,pass===0?0.9:0.12);
      vizCx.lineWidth=pass===0?2:10;vizCx.beginPath();
      const sw=W/time.length;let x=0;
      for(let i=0;i<time.length;i++){
        const v=time[i]/128;
        const drift=Math.sin(scopeShift+i/time.length*Math.PI*2)*H*0.04*overall;
        const y=H/2+(v-1)*H*0.44+drift;
        i===0?vizCx.moveTo(x,y):vizCx.lineTo(x,y);x+=sw;
      }
      vizCx.stroke();vizCx.restore();
    }
    // Grid
    vizCx.strokeStyle=rgbStr(rgb,0.07);vizCx.lineWidth=0.5;
    for(let i=1;i<4;i++){const y=(i/4)*H;vizCx.beginPath();vizCx.moveTo(0,y);vizCx.lineTo(W,y);vizCx.stroke();}
    for(let i=1;i<8;i++){const x=(i/8)*W;vizCx.beginPath();vizCx.moveTo(x,0);vizCx.lineTo(x,H);vizCx.stroke();}
  } else if(scopeMode===1){
    // Lissajous with slow rotation
    vizCx.save();vizCx.translate(W/2,H/2);vizCx.rotate(scopeShift*0.1);
    vizCx.strokeStyle=rgbStr(rgb,0.85);vizCx.lineWidth=1.5;vizCx.beginPath();
    const half=Math.floor(time.length/2);
    for(let i=0;i<half;i++){
      const x=(time[i]/128-1)*W*0.44*scopeZoom;
      const y=(time[i+half]/128-1)*H*0.44*scopeZoom;
      i===0?vizCx.moveTo(x,y):vizCx.lineTo(x,y);
    }
    vizCx.stroke();
    vizCx.save();vizCx.globalAlpha=0.15;vizCx.strokeStyle=rgbStr(rgb,1);vizCx.lineWidth=8;vizCx.stroke();vizCx.restore();
    vizCx.restore();
  } else {
    // XY scatter — dots placed by frequency pairs, auto-rotating
    vizCx.save();vizCx.translate(W/2,H/2);vizCx.rotate(scopeShift*0.05);
    const pts=Math.min(512,fft.length);
    for(let i=0;i<pts-1;i++){
      const x=(fft[i]/255-0.5)*W*0.9;
      const y=(fft[i+1]/255-0.5)*H*0.9;
      const rgb2=resolveColor(fft,i,pts);
      vizCx.globalAlpha=fft[i]/255*0.8;
      vizCx.fillStyle=rgbStr(rgb2,1);
      const sz=Math.max(0.5,fft[i]/255*4);
      vizCx.fillRect(x-sz/2,y-sz/2,sz,sz);
    }
    vizCx.globalAlpha=1;vizCx.restore();
  }
}

// ──────────────────────────────────────────────────────
//  4. RADIAL
// ──────────────────────────────────────────────────────
let radRot=0,radRot2=0,radPulse=0,radWave=0;
function drawRadial(W,H,fft){
  const bass=fftAvg(fft,0,8)/255;
  const mid=fftAvg(fft,8,80)/255;
  const overall=fftAvg(fft,0,200)/255;
  vizCx.fillStyle=`rgba(0,0,0,${0.18+bass*0.08})`;vizCx.fillRect(0,0,W,H);
  const cx=W/2,cy=H/2;
  const maxR=Math.min(W,H)*0.44,minR=maxR*0.18;
  // Two counter-rotating layers
  radRot+=0.004+bass*0.014;
  radRot2-=0.002+mid*0.008;
  radWave+=0.03;
  if(bass>0.65&&radPulse<0.3)radPulse=1.0;
  radPulse*=0.92;

  const bars=200;
  for(let layer=0;layer<2;layer++){
    const rot=layer===0?radRot:radRot2;
    const alpha=layer===0?1:0.45;
    const scale=layer===0?1:0.6;
    for(let i=0;i<bars;i++){
      const idx=Math.floor((i/bars)*fft.length*(layer===0?0.8:0.5));
      const v=fft[idx]/255;
      // Autonomous wave adds ripple even in silence
      const autoWave=Math.sin(radWave+i/bars*Math.PI*4)*0.06;
      const angle=(i/bars)*Math.PI*2+rot;
      const r0=minR*scale;
      const r1=r0+(v+autoWave)*((maxR-minR)*scale);
      const rgb=resolveColor(fft,i+layer*bars,bars*2);
      vizCx.strokeStyle=rgbStr(rgb,alpha*(0.5+v*0.5));
      vizCx.lineWidth=layer===0?1.8:1;
      vizCx.globalAlpha=alpha;
      vizCx.beginPath();
      vizCx.moveTo(cx+Math.cos(angle)*r0,cy+Math.sin(angle)*r0);
      vizCx.lineTo(cx+Math.cos(angle)*r1,cy+Math.sin(angle)*r1);
      vizCx.stroke();
    }
  }

  // Pulse ring
  if(radPulse>0.05){
    const rgb0=resolveColor(fft,0,1);
    const pr=minR+radPulse*(maxR-minR);
    vizCx.globalAlpha=radPulse*0.7;
    vizCx.strokeStyle=rgbStr(rgb0,1);vizCx.lineWidth=2;
    vizCx.beginPath();vizCx.arc(cx,cy,pr,0,Math.PI*2);vizCx.stroke();
    vizCx.globalAlpha=radPulse*0.2;vizCx.lineWidth=8;
    vizCx.beginPath();vizCx.arc(cx,cy,pr,0,Math.PI*2);vizCx.stroke();
  }

  // Center circle
  const rgb0=resolveColor(fft,0,1);
  vizCx.globalAlpha=0.3+bass*0.5;vizCx.strokeStyle=rgbStr(rgb0,1);vizCx.lineWidth=1;
  vizCx.beginPath();vizCx.arc(cx,cy,minR,0,Math.PI*2);vizCx.stroke();
  vizCx.globalAlpha=1;
}

// ──────────────────────────────────────────────────────
//  5. MIRROR KALEIDOSCOPE
// ──────────────────────────────────────────────────────
let mirrorRot=0,mirrorSegs=8,mirrorTime=0,mirrorZoom=1;
function drawMirror(W,H,fft,time){
  const bass=fftAvg(fft,0,8)/255;
  const mid=fftAvg(fft,8,80)/255;
  const overall=fftAvg(fft,0,200)/255;
  mirrorTime+=0.012+bass*0.025;
  mirrorRot+=0.003+bass*0.012;
  // Zoom breathes autonomously
  mirrorZoom+=(1+overall*0.35+Math.sin(mirrorTime*0.4)*0.08-mirrorZoom)*0.05;

  const targetSegs=bass>0.6?Math.round(4+mid*14)*2:Math.round(6+mid*6)*2;
  mirrorSegs+=(targetSegs-mirrorSegs)*0.025;
  const segs=Math.max(4,Math.round(mirrorSegs/2)*2);

  vizCx.fillStyle=`rgba(0,0,0,${0.1+bass*0.06})`;
  vizCx.fillRect(0,0,W,H);

  const cx=W/2,cy=H/2;
  const R=Math.min(W,H)*0.48*mirrorZoom;

  for(let seg=0;seg<segs;seg++){
    vizCx.save();
    vizCx.translate(cx,cy);
    vizCx.rotate((seg/segs)*Math.PI*2+mirrorRot);
    if(seg%2===1)vizCx.scale(1,-1);

    const wedge=(Math.PI*2)/segs;
    vizCx.beginPath();vizCx.moveTo(0,0);
    vizCx.arc(0,0,R,-wedge/2,wedge/2);vizCx.closePath();vizCx.clip();

    const rgb=resolveColor(fft,seg,segs);
    // Waveform ribbon — richer formula with two sin layers
    for(let pass=0;pass<2;pass++){
      vizCx.strokeStyle=rgbStr(rgb,pass===0?0.9:0.15);
      vizCx.lineWidth=pass===0?(1.5+overall):(10+overall*8);
      vizCx.beginPath();
      const pts=time.length;
      for(let i=0;i<pts;i++){
        const angle=(i/pts-0.5)*wedge;
        const v=time[i]/128;
        const auto=Math.sin(mirrorTime*1.8+i*0.015)*0.07+Math.sin(mirrorTime*0.9+(seg+i)*0.03)*0.04;
        const r=R*0.12+(v+auto)*R*0.55+Math.sin(mirrorTime*2.2+i*0.02)*R*0.08*(bass+0.2);
        vizCx.lineTo(Math.cos(angle)*r,Math.sin(angle)*r);
      }
      vizCx.stroke();
    }

    // Spectrum arc
    const bars=64;
    for(let b=0;b<bars;b++){
      const idx=Math.floor((b/bars)*fft.length*0.7);
      const v=fft[idx]/255;
      const auto=Math.sin(mirrorTime+b*0.1)*0.05;
      const angle=(b/bars-0.5)*wedge*0.95;
      const r0=R*0.04,r1=r0+(v+auto)*R*0.38;
      const rgb2=resolveColor(fft,b+seg*bars,segs*bars);
      vizCx.strokeStyle=rgbStr(rgb2,0.65+v*0.35);vizCx.lineWidth=1;vizCx.globalAlpha=1;
      vizCx.beginPath();
      vizCx.moveTo(Math.cos(angle)*r0,Math.sin(angle)*r0);
      vizCx.lineTo(Math.cos(angle)*r1,Math.sin(angle)*r1);
      vizCx.stroke();
    }
    vizCx.restore();
  }

  const rgb0=resolveColor(fft,0,1);
  const cSize=5+overall*18+bass*22;
  vizCx.globalAlpha=0.85;vizCx.fillStyle=rgbStr(rgb0,1);
  vizCx.beginPath();vizCx.arc(cx,cy,cSize,0,Math.PI*2);vizCx.fill();
  vizCx.globalAlpha=0.18;vizCx.beginPath();vizCx.arc(cx,cy,cSize*3.5,0,Math.PI*2);vizCx.fill();
  vizCx.globalAlpha=1;
}

// ──────────────────────────────────────────────────────
//  6. PLASMA — displaced wave mesh
// ──────────────────────────────────────────────────────
let plasmaT=0;
function drawPlasma(W,H,fft,time){
  const bass=fftAvg(fft,0,8)/255;
  const mid=fftAvg(fft,8,80)/255;
  const high=fftAvg(fft,80,200)/255;
  plasmaT+=0.022+bass*0.055;
  vizCx.fillStyle=`rgba(0,0,0,${0.16+bass*0.08})`;vizCx.fillRect(0,0,W,H);

  const cols=44,rows=25;
  const cw=W/cols,ch=H/rows;
  // Pre-compute displaced node positions — THIS is what makes it wavy
  const pts=[];
  for(let r=0;r<=rows;r++){
    pts[r]=[];
    for(let c=0;c<=cols;c++){
      const fi=Math.floor(((c+r*(cols+1))/((cols+1)*(rows+1)))*fft.length);
      const v=fft[fi]/255;
      // Multi-layer sinusoidal interference — nodes physically move
      const waveX=Math.sin(r*0.4+plasmaT*1.1)*cw*0.6
                 +Math.sin(c*0.3+plasmaT*0.7)*cw*0.3
                 +Math.sin((c+r)*0.25+plasmaT*0.5)*cw*0.2;
      const waveY=Math.cos(c*0.4+plasmaT*0.9)*ch*0.7
                 +Math.cos(r*0.35+plasmaT*1.3)*ch*0.35
                 +Math.sin((c-r)*0.2+plasmaT*0.8)*ch*0.25;
      // FFT amplitude adds extra displacement on top of autonomous wave
      const ampDisp=v*cw*1.4;
      const sx=c*cw+waveX+Math.sin(plasmaT*0.6+c*0.5)*ampDisp*0.5;
      const sy=r*ch+waveY+Math.cos(plasmaT*0.8+r*0.5)*ampDisp*0.5;
      const brightness=0.4+v*0.6+Math.abs(Math.sin(plasmaT+c*0.2+r*0.3))*0.2;
      pts[r][c]={sx,sy,v,brightness};
    }
  }

  // Draw connections first (behind points)
  for(let r=0;r<=rows;r++){
    for(let c=0;c<=cols;c++){
      const p=pts[r][c];
      const rgb=resolveColor(fft,c+r*(cols+1),(cols+1)*(rows+1));
      if(c<cols){
        const p2=pts[r][c+1];
        const a=Math.min(0.85,(p.v+p2.v)*0.8*p.brightness);
        vizCx.globalAlpha=a;vizCx.strokeStyle=rgbStr(rgb,1);
        vizCx.lineWidth=0.6+p.v*1.2;
        vizCx.beginPath();vizCx.moveTo(p.sx,p.sy);vizCx.lineTo(p2.sx,p2.sy);vizCx.stroke();
      }
      if(r<rows){
        const p3=pts[r+1][c];
        const a=Math.min(0.85,(p.v+p3.v)*0.8*p.brightness);
        vizCx.globalAlpha=a;vizCx.strokeStyle=rgbStr(rgb,1);
        vizCx.lineWidth=0.6+p.v*1.2;
        vizCx.beginPath();vizCx.moveTo(p.sx,p.sy);vizCx.lineTo(p3.sx,p3.sy);vizCx.stroke();
      }
    }
  }

  // Draw points on top
  for(let r=0;r<=rows;r++){
    for(let c=0;c<=cols;c++){
      const p=pts[r][c];
      const rgb=resolveColor(fft,c+r*(cols+1),(cols+1)*(rows+1));
      const ptSize=Math.max(0.8,(p.v*5+mid*2+high)*p.brightness);
      vizCx.globalAlpha=Math.min(1,p.brightness*(0.6+p.v*0.8));
      vizCx.fillStyle=rgbStr(rgb,1);
      vizCx.beginPath();vizCx.arc(p.sx,p.sy,ptSize*0.7,0,Math.PI*2);vizCx.fill();
    }
  }
  vizCx.globalAlpha=1;
}

// ══ MOBILE ══
const IS_MOBILE = window.innerWidth < 600;
const IS_TABLET = window.innerWidth >= 600 && window.innerWidth < 1024;

if(IS_MOBILE){
  // Show mobile-only elements
  document.getElementById('themeCycleBtn').style.display='flex';
  document.getElementById('vizFloatBtn').style.display='flex';
  // Hide desktop VIZ xbtn
  document.querySelectorAll('.xbtn').forEach(b=>{
    if(b.textContent.includes('VIZ'))b.style.display='none';
  });
}

// Theme cycling for mobile
const THEME_CYCLE=['casio','roland','yamaha','palestine'];
const THEME_LABELS=['CASIO','ROLAND','YAMAHA','🇵🇸'];
let themeCycleIdx=THEME_CYCLE.indexOf(currentTheme)||0;
function cycleTheme(){
  themeCycleIdx=(themeCycleIdx+1)%THEME_CYCLE.length;
  setTheme(THEME_CYCLE[themeCycleIdx]);
  document.getElementById('themeCycleLbl').textContent=THEME_LABELS[themeCycleIdx];
}

// Touch-friendly seek bar
const seekBarEl=document.getElementById('seekBar');
function seekFromTouch(e){
  e.preventDefault();
  if(!audioEl.duration||fileType==='midi')return;
  const touch=e.touches[0]||e.changedTouches[0];
  const r=seekBarEl.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(touch.clientX-r.left)/r.width));
  audioEl.currentTime=pct*audioEl.duration;
  document.getElementById('seekFill').style.width=(pct*100)+'%';
}
seekBarEl.addEventListener('touchstart',seekFromTouch,{passive:false});
seekBarEl.addEventListener('touchmove',seekFromTouch,{passive:false});

// Touch volume slider — already works natively, just needs larger thumb (CSS handles it)

// Prevent double-tap zoom on transport buttons
document.querySelectorAll('.t-btn').forEach(btn=>{
  btn.addEventListener('touchend',e=>{e.preventDefault();btn.click();},{passive:false});
});

// ══ INIT ══
renderPresets();setVol(80);
</script>
